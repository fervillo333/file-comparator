name: CI Pipeline

# 1. Коли запускати перевірку?
on: [push, pull_request]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest # Використовуємо Linux

    steps:
      # 2. Копіюємо ваш код на віртуальну машину
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Встановлюємо Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4. Встановлюємо залежності (ті, що ви вказали в коміті №1)
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8  # бібліотека для перевірки PEP8

      # 5. Перевірка PEP8 (стандарт написання коду)
      - name: Run PEP8 check (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

      # 6. Запуск самих тестів
      - name: Run tests with pytest
        run: |
          pytest --html=report.html --self-contained-html